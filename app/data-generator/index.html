    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function CustomSelect({ value, icon, iconType, options, onChange, placeholder }) {
            const [open, setOpen] = useState(false);
            const [search, setSearch] = useState('');
            const wrapRef = useRef(null);

            useEffect(() => {
                const handler = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) { setOpen(false); setSearch(''); } };
                document.addEventListener('mousedown', handler);
                return () => document.removeEventListener('mousedown', handler);
            }, []);

            const filtered = options.filter(o =>
                o.name.toLowerCase().includes(search.toLowerCase())
            ).slice(0, 12);

            const handleSelect = (o) => {
                onChange(o);
                setOpen(false);
                setSearch('');
            };

            return (
                <div className="cs-wrapper" ref={wrapRef}>
                    <div className={`cs-display${open ? ' open' : ''}`} onClick={() => setOpen(o => !o)}>
                        {icon && iconType === 'logo' && <img src={icon} className="cs-icon" alt="" onError={e => e.target.style.display='none'} />}
                        {icon && iconType === 'flag' && (
                             icon.startsWith('http')
                                ? <img src={icon} style={{width:28,height:20,objectFit:'cover',borderRadius:3,flexShrink:0}} alt="" />
                                : <span className="cs-flag">{icon}</span>
                        )}
                        {!icon && <span className="cs-icon-placeholder">{iconType === 'logo' ? '🏟️' : '🌍'}</span>}
                        <span className={value ? 'cs-value' : 'cs-placeholder'}>{value || placeholder}</span>
                        <span className={`cs-chevron${open ? ' open' : ''}`}>▾</span>
                    </div>
                    {open && (
                        <div className="cs-dropdown">
                            <div className="cs-search-wrap">
                                <input className="cs-search" value={search} onChange={e => setSearch(e.target.value)}
                                    placeholder="Caută..." autoFocus />
                            </div>
                            <div className="cs-options">
                                {search && filtered.length === 0 && (
                                    <div className="cs-option" onMouseDown={() => handleSelect({ name: search, logo: '', flag: '', code: '' })}>
                                        <span className="cs-add">+ Adaugă manual: "{search}"</span>
                                    </div>
                                )}
                                {filtered.map(o => (
                                    <div key={o.name} className="cs-option" onMouseDown={() => handleSelect(o)}>
                                        {iconType === 'logo' && <img src={o.logo} className="cs-option-logo" alt="" onError={e => e.target.style.display='none'} />}
                                        {iconType === 'flag' && (
    o.flag.startsWith('http')
    ? <img src={o.flag} style={{width:26,height:18,objectFit:'cover',borderRadius:3}} alt="" />
    : <span className="cs-option-flag">{o.flag}</span>
)}
                                        {o.name}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

                        if (!cell || cell.value == null) return '';
                        const v = cell.value;

                        if (typeof v === 'string' || typeof v === 'number') {
                            return String(v).trim();
                        }

                        if (v.richText) {
                            return v.richText.map(t => t.text).join('').trim();
                        }

                        if (v.text) {
                            return v.text.trim();
                        }

                        if (v.result) {

                        }

                         return '';
                    };

            const fetchJsonViaProxy = async (targetUrl) => {
                const proxies = [
                    (u) => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,
                    (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
                    (u) => `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(u)}`,
                ];
                let lastErr = null;
                for (const build of proxies) {
                    const proxyUrl = build(targetUrl);
                    try {
                        const r = await fetch(proxyUrl, {
                            headers: { 
                                'Accept': 'application/json, text/plain, */*',
                                'User-Agent': 'Mozilla/5.0'
                            }
                        });
                        if (!r.ok) { 
                            lastErr = new Error(`HTTP ${r.status}`); 
                            continue; 
                        }
                        const text = await r.text();
                        try {
                            return JSON.parse(text);
                        } catch {
                            try {
                                const wrapped = JSON.parse(text);
                                if (wrapped && wrapped.contents) {
                                    return JSON.parse(wrapped.contents);
                                }
                            } catch {}
                            lastErr = new Error('JSON invalid');
                            continue;
                        }
                    } catch (e) {
                        lastErr = e;
                        console.warn('Proxy JSON failed:', proxyUrl, e);
                    }
                }
                throw lastErr || new Error('Toate proxy-urile au eșuat');
            };

            const fetchImageAsBase64 = async (imageUrl) => {
                const proxies = [
                    `https://corsproxy.io/?url=${encodeURIComponent(imageUrl)}`,
                    `https://api.allorigins.win/raw?url=${encodeURIComponent(imageUrl)}`,
                    `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(imageUrl)}`,
                    `https://images.weserv.nl/?url=${encodeURIComponent(imageUrl.replace(/^https?:\/\//, ''))}`,
                ];
                let lastErr = null;
                for (const proxyUrl of proxies) {
                    try {
                        const response = await fetch(proxyUrl);
                        if (!response.ok) { lastErr = new Error(`HTTP ${response.status}`); continue; }
                        const blob = await response.blob();
                        if (!blob || blob.size < 100) { lastErr = new Error('Blob gol'); continue; }
                        return await new Promise((resolve, reject) => {
                            const reader = new FileReader();
                            reader.onloadend = () => resolve(reader.result);
                            reader.onerror = reject;
                            reader.readAsDataURL(blob);
                        });
                    } catch (e) {
                        lastErr = e;
                        console.warn('Proxy image failed:', proxyUrl, e);
                    }
                }
                throw lastErr || new Error('Toate proxy-urile au eșuat');
            };

            // Category header with circular SVG progress ring + progress bar
            const CatHeader = ({ emoji, title, statKeys, onAuto }) => {
                const avg = getCategoryAvg(statKeys);

                const radius = 24;

                const size = (radius + strokeW + 2) * 2;
                const cx = size / 2;
                const cy = size / 2;
                const circumference = 2 * Math.PI * radius;
                // Map avg 50–99 → 0–100% arc fill
                const fillRatio = (avg - 50) / 49;
                const filledDash = circumference * fillRatio;
                const gapDash = circumference - filledDash;
                // Start at top (12 o'clock): offset by -circumference/4
                const dashOffset = circumference / 4;

                // Subtle background ring color (dim version of main color)
                const trackColor = 'rgba(255,255,255,0.08)';

                return (
                    <div className="category-header" style={{flexDirection:'column', alignItems:'stretch'}}>

                    // ── Position Grid ──────────────────────────────────────

            // ─── PNG CARD GENERATOR ────────────────────────────────────────
            const generatePNG = async () => {
                setLoading(true);
                setStatus({ type: 'loading', message: '🖼️ Generare card PNG...' });
                try {
                    await document.fonts.ready;

                    const W = 1160, H = 750, SC = 2;
                    const canvas = document.createElement('canvas');
                    canvas.width = W * SC; canvas.height = H * SC;
                    const ctx = canvas.getContext('2d');
                    ctx.scale(SC, SC);

                    // ── Helpers ──────────────────────────────────────────────
                    const sColor = v => v>=90?'#1bc8b8':v>=80?'#a2e040':v>=70?'#f0a500':'#e03535';
                    const cAvg  = keys => Math.round(keys.map(k=>playerData[k]||50).reduce((a,b)=>a+b,0)/keys.length);

                    const rr = (x,y,w,h,rad,fill,stroke,sw=1) => {
                        ctx.beginPath();
                        if(ctx.roundRect){ ctx.roundRect(x,y,w,h,rad); }
                        else {
                            ctx.moveTo(x+rad,y); ctx.lineTo(x+w-rad,y); ctx.quadraticCurveTo(x+w,y,x+w,y+rad);
                            ctx.lineTo(x+w,y+h-rad); ctx.quadraticCurveTo(x+w,y+h,x+w-rad,y+h);
                            ctx.lineTo(x+rad,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-rad);
                            ctx.lineTo(x,y+rad); ctx.quadraticCurveTo(x,y,x+rad,y); ctx.closePath();
                        }
                        if(fill){ ctx.fillStyle=fill; ctx.fill(); }
                        if(stroke){ ctx.strokeStyle=stroke; ctx.lineWidth=sw; ctx.stroke(); }
                    };

                    const tx = (text,x,y,color='#fff',size=14,weight='400',align='left') => {
                        ctx.save();
                        ctx.fillStyle=color; ctx.font=`${weight} ${size}px "Outfit",sans-serif`;
                        ctx.textAlign=align; ctx.textBaseline='middle';
                        ctx.fillText(String(text),x,y);
                        ctx.restore();
                    };

                    const mw = (text,size,weight='400') => {
                        ctx.font=`${weight} ${size}px "Outfit",sans-serif`;
                        return ctx.measureText(String(text)).width;
                    };

                    const dc = (cx,cy,val,r=28) => {
                        const color=sColor(val), ratio=Math.max(0,(val-50)/49);
                        ctx.save(); ctx.shadowColor=color; ctx.shadowBlur=12;
                        ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fillStyle='#0a1020'; ctx.fill();
                        ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=5; ctx.stroke();
                        ctx.beginPath(); ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+ratio*Math.PI*2); ctx.strokeStyle=color; ctx.lineWidth=5; ctx.lineCap='round'; ctx.stroke();
                        ctx.restore();
                        tx(val,cx,cy,color,16,'900','center');
                    };

                    // ── Background ───────────────────────────────────────────
                    const bgGrad = ctx.createLinearGradient(0,0,W,H);
                    bgGrad.addColorStop(0,'#161739'); bgGrad.addColorStop(0.45,'#0d1133'); bgGrad.addColorStop(1,'#1a1252');
                    ctx.fillStyle=bgGrad; ctx.fillRect(0,0,W,H);

                    // Tiger stripes
                    ctx.save();
                    for(let i=-H; i<W+H; i+=42){
                        ctx.globalAlpha=0.11; ctx.fillStyle='#00001a';
                        ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i+20,0); ctx.lineTo(i+20+H,H); ctx.lineTo(i+H,H); ctx.closePath(); ctx.fill();
                    }
                    ctx.globalAlpha=1; ctx.restore();

                    // ── Top info block ───────────────────────────────────────
                    // Pre-load club logo if available
                    let clubLogoImg = null;
                    if (playerData.clubLogo) {
                        clubLogoImg = new Image(); clubLogoImg.crossOrigin='anonymous';
                        await new Promise(res => { clubLogoImg.onload=res; clubLogoImg.onerror=()=>{clubLogoImg=null;res();}; clubLogoImg.src=playerData.clubLogo; });
                    }

                    const drawInfoRow = (label, value, vc, ls, lw, vw, y, icon) => {
                        const iconW = icon ? 20 : 0;
                        const iconGap = icon ? 5 : 0;
                        const lW2 = mw(label, ls, lw);
                        const vW2 = mw(String(value), ls, vw);
                        const totalW = lW2 + iconW + iconGap + vW2;
                        const sx = W/2 - totalW/2;
                        ctx.save();
                        ctx.textBaseline='middle'; ctx.textAlign='left';
                        ctx.font=`${lw} ${ls}px "Outfit",sans-serif`; ctx.fillStyle='#9aaabb'; ctx.fillText(label, sx, y);
                        let curX = sx + lW2;
                        if (icon) {
                            if (icon.type === 'img' && icon.img) {
                                const iSize = 16;
                                ctx.drawImage(icon.img, curX, y - iSize/2, iSize, iSize);
                                curX += iSize + iconGap;
                            } else if (icon.type === 'emoji') {
                                ctx.font = `${ls}px "Noto Color Emoji","Apple Color Emoji","Segoe UI Emoji",sans-serif`;
                                ctx.fillText(icon.char, curX, y);
                                curX += iconW + iconGap;
                            }
                        }
                        ctx.font=`${vw} ${ls}px "Outfit",sans-serif`; ctx.fillStyle=vc; ctx.fillText(String(value), curX, y);
                        ctx.restore();
                    };

                    const flagEmoji = playerData.nationalityFlag && !playerData.nationalityFlag.startsWith('http') ? playerData.nationalityFlag : '';

                    const infoRows = [
                        { label:'Name: ',        value:playerData.name,        vc:'#ffffff', ls:17, lw:'600', vw:'700', icon: null },
                        { label:'Club: ',        value:playerData.club,        vc:'#a2e040', ls:14, lw:'500', vw:'700', icon: clubLogoImg ? {type:'img', img:clubLogoImg} : null },
                        { label:'Nationality: ', value:playerData.nationality, vc:'#a2e040', ls:14, lw:'500', vw:'700', icon: flagEmoji ? {type:'emoji', char:flagEmoji} : null },
                        { label:'Position:  ',   value:playerData.position,    vc:'#ffffff', ls:14, lw:'500', vw:'700', icon: null },
                        { label:'Rating: ',      value:playerData.rating,      vc:sColor(playerData.rating), ls:14, lw:'500', vw:'700', icon: null },
                    ];

                    infoRows.forEach(({label,value,vc,ls,lw,vw,icon},i) => {
                        const y = 14 + i*18;
                        drawInfoRow(label, value, vc, ls, lw, vw, y, icon);
                    });

                    // ── Player photo ─────────────────────────────────────────
                    const PX=20, PY=105, PW=195, PH=248;
                    rr(PX,PY,PW,PH,8,'rgba(0,0,0,0.4)','rgba(255,255,255,0.25)',2);

                    if(playerData.imageUrl){
                        const img=new Image(); img.crossOrigin='anonymous';
                        await new Promise(res=>{ img.onload=res; img.onerror=res; img.src=playerData.imageUrl; });
                        ctx.save();
                        ctx.beginPath();
                        if(ctx.roundRect) ctx.roundRect(PX+1,PY+1,PW-2,PH-2,7); else ctx.rect(PX+1,PY+1,PW-2,PH-2);
                        ctx.clip(); ctx.drawImage(img,PX+1,PY+1,PW-2,PH-2); ctx.restore();
                    } else {
                        tx('⚽',PX+PW/2,PY+PH/2,'#ffffff',52,'400','center');
                    }



                    // ── Other abilities ──────────────────────────────────────
                    const OAY = PY+PH+16;
                    tx('Other abilities:',PX,OAY,'#ffffff',13,'700');

                    // Weak foot circle
                    const wf=playerData.weakFoot||50, wfC=sColor(wf), wfR=16;
                    const wfCX=PX+158, wfCY=OAY+28;
                    tx('Weak foot',PX,wfCY,'#aabbcc',12);
                    ctx.save(); ctx.shadowColor=wfC; ctx.shadowBlur=8;
                    ctx.beginPath(); ctx.arc(wfCX,wfCY,wfR,0,Math.PI*2); ctx.fillStyle='#0a1020'; ctx.fill();
                    ctx.beginPath(); ctx.arc(wfCX,wfCY,wfR,0,Math.PI*2); ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=3.5; ctx.stroke();
                    const wfRatio=Math.max(0,(wf-50)/49);
                    ctx.beginPath(); ctx.arc(wfCX,wfCY,wfR,-Math.PI/2,-Math.PI/2+wfRatio*Math.PI*2); ctx.strokeStyle=wfC; ctx.lineWidth=3.5; ctx.lineCap='round'; ctx.stroke();
                    ctx.restore();
                    tx(wf,wfCX,wfCY,wfC,10,'700','center');

                    // Diamonds and arrows
                    tx('Skill moves', PX, OAY+54,'#aabbcc',12);
                    tx('◆'.repeat(playerData.skillMoves||0), PX+110, OAY+54,'#00d4ff',14,'700');
                    tx('Injury res.',  PX, OAY+76,'#aabbcc',12);
                    tx('◆'.repeat(playerData.injuryResistance||0), PX+110, OAY+76,'#00d4ff',14,'700');
                    tx('Actual form',  PX, OAY+98,'#aabbcc',12);
                    tx('→'.repeat(playerData.actualForm||0), PX+110, OAY+98,'#ffd700',14,'700');

                    // ── Stat columns ─────────────────────────────────────────
                    const COLS = isGK ? [
                        {title:'GOALKEEPING',  keys:['diving','handling','gkKicking','reflexes','gkPositioning'],     labels:['Diving','Handling','Kicking','Reflexes','Positioning']},
                        {title:'GEN. ABILITIES',keys:['shotPower','shotPrecision','freeKickAbility','penalty','heading'],labels:['Shot power','Shot prec.','Free kick','Penalty','Heading']},
                        {title:'PLAYMAKING',   keys:['passPrecision','ballControl','vision','balance','clearance'],   labels:['Pass prec.','Ball control','Vision','Balance','Clearance']},
                        {title:'PHYSICAL',     keys:['sprintSpeed','speed','physicalResistance','stamina'],           labels:['Sprint speed','Speed','Physical res.','Stamina']},
                    ] : [
                        {title:'ATTACKING',    keys:['attackingAbilities','ballControl','dribbling','shotPower','shotPrecision','freeKickAbility','penalty','curl','volley','finishing'],labels:['Att. abilities','Ball control','Dribbling','Shot power','Shot prec.','Free kick','Penalty','Curl','Volley','Finishing']},
                        {title:'DEFENDING',    keys:['defendingAbilities','tightPossession','ballTackle','heading','slidingTackle'],labels:['Def. abilities','Tight poss.','Ball tackle','Heading','Sliding tackle']},
                        {title:'PLAYMAKING',   keys:['passPrecision','loftedPass','vision','positioning','balance'],  labels:['Pass prec.','Lofted pass','Vision','Positioning','Balance']},
                        {title:'PHYSICAL',     keys:['sprintSpeed','speed','physicalResistance','stamina'],           labels:['Sprint speed','Speed','Physical res.','Stamina']},
                    ];

                    const CX=222, CY=100;
                    const CW=Math.floor((W-CX-16)/4);
                    const maxStat=COLS.reduce((m,c)=>Math.max(m,c.keys.length),0);

                    COLS.forEach((col,ci) => {
                        const x=CX+ci*CW;
                        const avg=cAvg(col.keys);
                        const color=sColor(avg);

                        rr(x+3,CY,CW-6,H-CY-14,8,'rgba(255,255,255,0.035)','rgba(255,255,255,0.07)',1);

                        // Title
                        tx(col.title, x+CW/2, CY+16, color, 11, '800', 'center');

                        // Separator
                        ctx.save(); ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=1;
                        ctx.beginPath(); ctx.moveTo(x+12,CY+27); ctx.lineTo(x+CW-12,CY+27); ctx.stroke();
                        ctx.restore();

                        // Circle
                        dc(x+CW/2, CY+64, avg, 27);

                        // Stats
                        col.keys.forEach((k,i) => {
                            const v=playerData[k]||50;
                            const sy=CY+108+i*22;
                            rr(x+6,sy-9,CW-12,18,3,'rgba(0,0,0,0.25)',null);
                            tx(col.labels[i]+'-', x+10,  sy, '#ccd8e8', 11);
                            tx(v,                 x+CW-10, sy, sColor(v), 11, '700', 'right');
                        });
                    });

                    // ── Bottom: skills + position grid ───────────────────────
                    const lastStatY = CY+108+(maxStat-1)*22+9+14;
                    const BotY = lastStatY + 20;

                    // Special Skills
                    if(playerData.selectedSkills.length > 0){
                        tx('Special Skills:',CX,BotY,'#ffffff',12,'700');
                        const perCol = Math.ceil(playerData.selectedSkills.length/4);
                        playerData.selectedSkills.forEach((s,i) => {
                            const col=Math.floor(i/perCol), row=i%perCol;
                            tx(s+' ⭐', CX+col*195, BotY+18+row*18, '#ffffff', 11);
                        });
                    }

                    // Position grid
                    const PGX=W-175, PGY=BotY-5;
                    const PCW=52, PCH=30, PGAP=2;
                    const POS_ROWS=[['LF','ST','RF'],['LM','AM','RM'],['','CM',''],['','DM',''],['LB','CB','RB'],['','GK','']];
                    const altPos2=playerData.altPositions||{};

                    rr(PGX-4,PGY-4,PCW*3+PGAP*2+8,PCH*6+PGAP*5+8,6,'#081624',null);

                    POS_ROWS.forEach((row,ri) => row.forEach((pos,ci) => {
                        if(!pos) return;
                        const px=PGX+ci*(PCW+PGAP), py=PGY+ri*(PCH+PGAP);
                        const isPrim=pos===playerData.position, isAltP=altPos2[pos]!==undefined;
                        const pbg=isPrim?sColor(playerData.rating):isAltP?sColor(altPos2[pos]||50):'#0f2236';
                        const ptc=(isPrim||isAltP)?'#000':'#4a6070';
                        rr(px,py,PCW,PCH,3,pbg,null);
                        const midY = py+(isPrim||isAltP ? PCH/2-5 : PCH/2);
                        tx(pos,px+PCW/2,midY,ptc,10,'800','center');
                        if(isPrim||isAltP){
                            const rval=isPrim?playerData.rating:(altPos2[pos]||50);
                            tx('('+rval+')',px+PCW/2,py+PCH/2+7,'rgba(0,0,0,0.65)',9,'600','center');
                        }
                    }));

                    // ── Download ─────────────────────────────────────────────
                    const dlLink=document.createElement('a');
                    dlLink.download=`${(playerData.name||'player').replace(/\s+/g,'_')}_card.png`;
                    dlLink.href=canvas.toDataURL('image/png');
                    dlLink.click();

                    setStatus({type:'success',message:'✅ Card PNG generat și descărcat!'});
                } catch(err){
                    console.error(err);
                    setStatus({type:'error',message:`❌ Eroare PNG: ${err.message}`});
                }
                setLoading(false);
                setTimeout(()=>setStatus({type:'',message:''}),4000);
            };
            // ──────────────────────────────────────────────────────────────

            // Găsim logo-ul clubului selectat
            const selectedClub = CLUBS.find(c => c.name === playerData.club);

            return (
                <div className="app-container">
                    <div className="app-header">
                        <h1>⚽ PLAYER CARD GENERATOR</h1>
                        <p className="subtitle">Creează și importă carduri profesionale de jucători în format Excel</p>
                    </div>

                    <div className="main-container">
                        <div className="sidebar">
                            <div className="card">
                                <div className="import-section">
                                    <h3>📥 IMPORTĂ DIN EXCEL</h3>
                                    <p style={{fontSize: '0.9rem', color: '#8899aa', marginBottom: '15px'}}>
                                        Încarcă un fișier Excel existent pentru a edita un jucător
                                    </p>
                                    <input 
                                        type="file" 
                                        accept=".xlsx,.xls" 
                                        onChange={handleExcelImport}
                                        style={{display: 'none'}} 
                                        id="excelImportInput"
                                    />
                                    <button 
                                        className="btn-import" 
                                        onClick={() => document.getElementById('excelImportInput').click()}
                                        style={{width: '100%'}}
                                    >
                                        📂 Selectează Fișier Excel
                                    </button>
                                </div>
                            </div>

                            <div className="card">
                                <div className="section-title">📝 Date Jucător</div>
                                <div className="grid-2">
                                    <div className="input-group">
                                        <label>Nume</label>
                                        <input value={playerData.name} onChange={(e) => handleInputChange('name', e.target.value)} />
                                    </div>
                                    <div className="input-group" style={{gridColumn: '1 / -1'}}>
                                        <label>Club</label>
                                        <CustomSelect
                                            value={playerData.club}
                                            icon={playerData.clubLogo}
                                            iconType="logo"
                                            options={CLUBS}
                                            placeholder="Selectează sau scrie club..."
                                            onChange={o => { handleInputChange('club', o.name); handleInputChange('clubLogo', o.logo || ''); }}
                                        />
                                    </div>
                                    <div className="input-group" style={{gridColumn: '1 / -1'}}>
                                        <label>Țară</label>
                                        <CustomSelect
                                            value={playerData.nationality}
                                            icon={playerData.nationalityFlag}
                                            iconType="flag"
                                            options={COUNTRIES}
                                            placeholder="Selectează sau scrie țara..."
                                            onChange={o => { handleInputChange('nationality', o.name); handleInputChange('nationalityFlag', o.flag || ''); }}
                                        />
                                    </div>
                                    <div className="input-group">
                                        <label>Poziție</label>
                                        <select value={playerData.position} onChange={(e) => handleInputChange('position', e.target.value)}>
                                            {POSITIONS.map(pos => <option key={pos} value={pos}>{pos}</option>)}
                                        </select>
                                    </div>
                                    <div className="input-group">
                                        <label>Rating</label>
                                        <input type="number" min="50" max="99" value={playerData.rating}
                                               onChange={(e) => handleInputChange('rating', parseInt(e.target.value))} />
                                    </div>
                                </div>
                            </div>

                            <div className="card">
                                <div className="section-title green">📸 Imagine Jucător</div>
                                <div className={`image-upload${isDragOver ? ' drag-over' : ''}`}
                                    onClick={() => document.getElementById('imageInput').click()}
                                    onDragOver={handleDragOver}
                                    onDragEnter={handleDragEnter}
                                    onDragLeave={handleDragLeave}
                                    onDrop={handleDrop}
                                >
                                    {playerData.imageUrl ? (
                                        <img src={playerData.imageUrl} className="image-preview" alt="Player" />
                                    ) : (
                                        <div>
                                            <p style={{color: isDragOver ? '#00d4ff' : '#8899aa', fontWeight: isDragOver ? '700' : '400', transition: 'all 0.2s'}}>
                                                {isDragOver ? '📸 Eliberează pentru a încărca!' : 'Click sau trage imaginea aici'}
                                            </p>
                                            <p style={{color: '#556677', fontSize: '0.78rem', marginTop: '8px'}}>PNG, JPG, WEBP acceptate</p>
                                        </div>
                                    )}
                                    <input id="imageInput" type="file" accept="image/*" style={{display: 'none'}} onChange={handleImageUpload} />
                                </div>

                                <p className="info-text">* Imaginea va fi inclusă în Excel (120x120px)</p>
                            </div>

                            <div className="card">
                                <div className="section-title">⚙️ Alte Abilități</div>
                                <div className="input-group">
                                    <label>Weak Foot (50-99)</label>
                                    <input type="number" min="50" max="99" value={playerData.weakFoot}
                                           onChange={(e) => handleInputChange('weakFoot', parseInt(e.target.value))} />
                                </div>
                                <div className="input-group">
                                    <label>Skill Moves (1-5 ⭐)</label>
                                    <input type="number" min="1" max="5" value={playerData.skillMoves}
                                           onChange={(e) => handleInputChange('skillMoves', parseInt(e.target.value))} />
                                </div>
                                <div className="input-group">
                                    <label>Injury Resistance (1-5 ⭐)</label>
                                    <input type="number" min="1" max="5" value={playerData.injuryResistance}
                                           onChange={(e) => handleInputChange('injuryResistance', parseInt(e.target.value))} />
                                </div>
                                <div className="input-group">
                                    <label>Actual Form (1-5 ➡️)</label>
                                    <input type="number" min="1" max="5" value={playerData.actualForm}
                                           onChange={(e) => handleInputChange('actualForm', parseInt(e.target.value))} />
                                </div>
                            </div>
                        </div>

                        <div className="main-content">
                            <div className="card">
                                <div className="section-title">📊 Statistici</div>
                                <div className="tabs">
                                    {isGK ? (
                                        <>
                                            {['goalkeeping','defending','playmaking','physical'].map(tab => (
                                                <button key={tab} className={`tab ${activeTab === tab ? 'active' : ''}`}
                                                        onClick={() => setActiveTab(tab)}>{tab}</button>
                                            ))}
                                        </>
                                    ) : (
                                        <>
                                            {['attacking','defending','playmaking','physical'].map(tab => (
                                                <button key={tab} className={`tab ${activeTab === tab ? 'active' : ''}`}
                                                        onClick={() => setActiveTab(tab)}>{tab}</button>
                                            ))}
                                        </>
                                    )}
                                </div>

                                {activeTab === 'goalkeeping' && isGK && (
                                    <div>
                                        <CatHeader emoji="🧤" title="GOALKEEPING"
                                            statKeys={['diving','handling','gkKicking','reflexes','gkPositioning']}
                                            onAuto={() => autoGenerateStats('goalkeeping')} />
                                        <div className="stats-grid">
                                            {[
                                                {key: 'diving', label: 'Diving'},
                                                {key: 'handling', label: 'Handling'},
                                                {key: 'gkKicking', label: 'Kicking'},
                                                {key: 'reflexes', label: 'Reflexes'},
                                                {key: 'gkPositioning', label: 'Positioning'}
                                            ].map(s => <StatRow key={s.key} statKey={s.key} label={s.label} />)}
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'attacking' && !isGK && (
                                    <div>
                                        <CatHeader emoji="⚔️" title="ATTACKING"
                                            statKeys={['attackingAbilities','ballControl','dribbling','shotPower','shotPrecision','freeKickAbility','penalty','curl','volley','finishing']}
                                            onAuto={() => autoGenerateStats('attacking')} />
                                        <div className="stats-grid">
                                            {[
                                                {key:'attackingAbilities', label:'Attacking Abilities'},
                                                {key:'ballControl',        label:'Ball Control'},
                                                {key:'dribbling',          label:'Dribbling'},
                                                {key:'shotPower',          label:'Shot Power'},
                                                {key:'shotPrecision',      label:'Shot Precision'},
                                                {key:'freeKickAbility',    label:'Free Kick Ability'},
                                                {key:'penalty',            label:'Penalty'},
                                                {key:'curl',               label:'Curl'},
                                                {key:'volley',             label:'Volley'},
                                                {key:'finishing',          label:'Finishing'},
                                            ].map(s => <StatRow key={s.key} statKey={s.key} label={s.label} />)}
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'defending' && (
                                    <div>
                                        <CatHeader emoji="🛡️" title="DEFENDING"
                                            statKeys={['defendingAbilities','tightPossession','ballTackle','heading','slidingTackle']}
                                            onAuto={() => autoGenerateStats('defending')} />
                                        <div className="stats-grid">
                                            {[
                                                {key:'defendingAbilities', label:'Defending Abilities'},
                                                {key:'tightPossession',    label:'Tight Possession'},
                                                {key:'ballTackle',         label:'Ball Tackle'},
                                                {key:'heading',            label:'Heading'},
                                                {key:'slidingTackle',      label:'Sliding Tackle'},
                                            ].map(s => <StatRow key={s.key} statKey={s.key} label={s.label} />)}
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'playmaking' && (
                                    <div>
                                        <CatHeader emoji="🎯" title="PLAYMAKING"
                                            statKeys={isGK
                                                ? ['passPrecision','ballControl','vision','balance','clearance']
                                                : ['passPrecision','loftedPass','vision','positioning','balance']}
                                            onAuto={() => autoGenerateStats('playmaking')} />
                                        <div className="stats-grid">
                                            {isGK ? (
                                                [
                                                    {key:'passPrecision', label:'Pass Precision'},
                                                    {key:'ballControl',   label:'Ball Control'},
                                                    {key:'vision',        label:'Vision'},
                                                    {key:'balance',       label:'Balance (Jumping)'},
                                                    {key:'clearance',     label:'Clearance'},
                                                ].map(s => <StatRow key={s.key} statKey={s.key} label={s.label} />)
                                            ) : (
                                                [
                                                    {key:'passPrecision', label:'Pass Precision'},
                                                    {key:'loftedPass',    label:'Lofted Pass'},
                                                    {key:'vision',        label:'Vision'},
                                                    {key:'positioning',   label:'Positioning'},
                                                    {key:'balance',       label:'Balance'},
                                                ].map(s => <StatRow key={s.key} statKey={s.key} label={s.label} />)
                                            )}
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'physical' && (
                                    <div>
                                        <CatHeader emoji="💪" title="PHYSICAL"
                                            statKeys={['sprintSpeed','speed','physicalResistance','stamina']}
                                            onAuto={() => autoGenerateStats('physical')} />
                                        <div className="stats-grid">
                                            {[
                                                {key:'sprintSpeed',          label:'Sprint Speed'},
                                                {key:'speed',                label:'Speed'},
                                                {key:'physicalResistance',   label:'Physical Resistance'},
                                                {key:'stamina',              label:'Stamina'},
                                            ].map(s => <StatRow key={s.key} statKey={s.key} label={s.label} />)}
                                        </div>
                                    </div>
                                )}
                            </div>

                            <div className="card">
                                <div className="section-title">✨ Special Skills</div>
                                <p style={{ color: '#8899aa', marginBottom: '20px', fontSize: '0.95rem' }}>
                                    Selectează abilitățile speciale ale jucătorului ({playerData.selectedSkills.length} selectate)
                                </p>
                                <div className="skills-container">
                                    {SPECIAL_SKILLS.map(skill => (
                                        <div key={skill} className={`skill-item ${playerData.selectedSkills.includes(skill) ? 'selected' : ''}`}
                                             onClick={() => toggleSkill(skill)}>
                                            <input type="checkbox" className="skill-checkbox"
                                                   checked={playerData.selectedSkills.includes(skill)} onChange={() => {}} />
                                            <span className="skill-label">{skill}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="card">
                                <div className="section-title">🗺️ Poziții Jucător</div>
                                <p style={{ color: '#8899aa', marginBottom: '16px', fontSize: '0.9rem' }}>
                                    Poziția primară <span style={{color:'#1bc8b8', fontWeight:700}}>{playerData.position}</span> e evidențiată automat.
                                    Click pe orice altă poziție pentru a o adăuga ca alternativă și introdu ratingul.
                                </p>
                                <PositionGrid />
                            </div>

                            <div className="card" style={{ textAlign: 'center' }}>
                                <div style={{ display: 'flex', gap: '16px', justifyContent: 'center', flexWrap: 'wrap' }}>
                                    <button className="btn-generate" onClick={generateExcel} disabled={loading}>
                                        {loading ? '⏳ Generare...' : '⚽ GENEREAZĂ EXCEL CU IMAGINE'}
                                    </button>
                                    <button className="btn-generate" onClick={generatePNG} disabled={loading}
                                        style={{ background: 'linear-gradient(135deg, #7928ca 0%, #c0137a 50%, #ff0080 100%)', backgroundSize: '200% 200%', animation: 'gradient-shift 3s ease infinite' }}>
                                        {loading ? '⏳ Generare...' : '🖼️ SALVEAZĂ CA PNG'}
                                    </button>
                                </div>
                                {status.message && (
                                    <div className={`status-message status-${status.type}`}>
                                        {status.type === 'loading' && <span className="loading-spinner"></span>}
                                        {status.message}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* ── Floating Action Button (DB Comparator) ── */}
                    <button className="comp-fab" onClick={() => setCompOpen(true)} title="Compară cu baza de date">
                        <span>🔍</span>
                        <span className="comp-fab-label">COMPARE</span>
                    </button>

                    {/* ── DB Comparator Overlay ── */}
                    {compOpen && (
                    <div className="comp-overlay" onClick={e => { if (e.target === e.currentTarget) setCompOpen(false); }}>
                        <div className="comp-panel">
                            <div className="comp-header">
                                <div className="comp-header-top">
                                    <span className="comp-title">⚡ DB COMPARATOR</span>
                                    <button className="comp-close" onClick={() => setCompOpen(false)}>✕</button>
                                </div>
                                <div className="comp-subtitle">
                                    Caută în <strong>baza de date 2026</strong> și compară statisticile cu cardul tău.
                                </div>
                                <div className="comp-search-row">
                                    <input
                                        className="comp-input"
                                        placeholder="ex: Mbappe, Bellingham, Salah..."
                                        value={compSearch}
                                        onChange={e => setCompSearch(e.target.value)}
                                        onKeyDown={e => e.key === 'Enter' && searchLocalDB()}
                                        autoComplete="off"
                                        spellCheck="false"
                                        style={{fontSize:'1.05rem', padding:'14px 18px'}}
                                    />
                                    <button className="comp-search-btn" onClick={searchLocalDB}>
                                        🔍 Caută
                                    </button>
                                </div>
                                {compError && <div className="comp-error">⚠️ {compError}</div>}
                            </div>

                            <div className="comp-body">
                                {!compResult && compCandidates.length === 0 && !compError && (
                                    <div className="comp-empty">
                                        <div className="comp-empty-icon">⚽</div>
                                        <div className="comp-empty-text">
                                            Introdu numele, clubul sau naționalitatea unui jucător și apasă <strong style={{color:'#c084fc'}}>Caută</strong>.<br/>
                                            Statisticile vor fi preluate din <strong style={{color:'#c084fc'}}>baza de date 2026</strong> și comparate cu cardul tău.
                                        </div>
                                    </div>
                                )}

                                {compCandidates.length > 1 && !compResult && (
                                    <div>
                                        <div className="comp-candidates-header">
                                            S-au găsit <strong>{compCandidates.length} jucători</strong>. Alege unul:
                                        </div>
                                        <div className="comp-candidates-list">
                                            {compCandidates.map((p, i) => (
                                                <button key={i} className="comp-candidate-btn" onClick={() => applyDBPlayer(p)}>
                                                    <div className="comp-candidate-rating">{p.rating}</div>
                                                    <div className="comp-candidate-info">
                                                        <div className="comp-candidate-name">{p.name}</div>
                                                        <div className="comp-candidate-meta">{p.position} · {p.club} · {p.nationality}</div>
                                                    </div>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {compResult && (() => {
                                    const currentIsGK = playerData.position === 'GK';
                                    const visibleCats = currentIsGK
                                        ? { 'Goalkeeping': COMP_CATEGORIES['Goalkeeping'], 'Playmaking': COMP_CATEGORIES['Playmaking'], 'Physical': COMP_CATEGORIES['Physical'] }
                                        : { 'Attacking': COMP_CATEGORIES['Attacking'], 'Defending': COMP_CATEGORIES['Defending'], 'Playmaking': COMP_CATEGORIES['Playmaking'], 'Physical': COMP_CATEGORIES['Physical'] };
                                    return (
                                        <div>
                                            <div className="comp-player-card">
                                                <div className="comp-player-rating">{compResult.overall || '?'}</div>
                                                <div className="comp-player-info">
                                                    <div className="comp-player-name">{compResult.playerName}</div>
                                                    <div className="comp-player-meta">
                                                        {compResult.position} · {compResult.club} · {compResult.nationality}{compResult.age ? ` · ${compResult.age} ani` : ''}
                                                    </div>
                                                </div>
                                                <div className="comp-source-badge">{compResult.source}</div>
                                            </div>

                                            <button className="comp-apply-all" onClick={applyAllCompStats}>
                                                ✅ APLICĂ TOATE STATISTICILE LA CARDUL MEU
                                            </button>

                                            <div className="comp-legend">
                                                <div className="comp-legend-item"><div className="comp-legend-dot" style={{background:'linear-gradient(135deg,#7928ca,#ff0080)'}}></div> DB 2026</div>
                                                <div className="comp-legend-item"><div className="comp-legend-dot" style={{background:'rgba(70,100,140,0.7)'}}></div> Cardul tău</div>
                                                <div className="comp-legend-item" style={{color:'#00e87a'}}>▲ mai mare</div>
                                                <div className="comp-legend-item" style={{color:'#ff5252'}}>▼ mai mic</div>
                                            </div>

                                            {/* ── Profile Info Section ── */}
                                            <div className="comp-cat-title">Profil Jucător</div>
                                            {[
                                                { label: 'Nume', dbVal: compResult.playerName, myVal: playerData.name, apply: () => handleInputChange('name', compResult.playerName), isText: true },
                                                { label: 'Club', dbVal: compResult.club, myVal: playerData.club, apply: () => handleInputChange('club', compResult.club), isText: true },
                                                { label: 'Naționalitate', dbVal: compResult.nationality, myVal: playerData.nationality, apply: () => handleInputChange('nationality', compResult.nationality), isText: true },
                                                { label: 'Poziție', dbVal: compResult.position, myVal: playerData.position, apply: () => { if (POSITIONS.includes(compResult.position)) handleInputChange('position', compResult.position); }, isText: true },
                                                { label: 'Rating', dbVal: compResult.overall, myVal: playerData.rating, apply: () => handleInputChange('rating', Math.min(99, Math.max(50, compResult.overall))), isText: false },
                                                ...(compResult.weakFoot !== undefined ? [{ label: 'Weak Foot', dbVal: compResult.weakFoot, myVal: playerData.weakFoot, apply: () => handleInputChange('weakFoot', compResult.weakFoot), isText: false }] : []),
                                                ...(compResult.skillMoves !== undefined ? [{ label: 'Skill Moves ⭐', dbVal: compResult.skillMoves, myVal: playerData.skillMoves, apply: () => handleInputChange('skillMoves', compResult.skillMoves), isText: false }] : []),
                                                ...(compResult.injuryResistance !== undefined ? [{ label: 'Injury Resistance', dbVal: compResult.injuryResistance, myVal: playerData.injuryResistance, apply: () => handleInputChange('injuryResistance', compResult.injuryResistance), isText: false }] : []),
                                                ...(compResult.actualForm !== undefined ? [{ label: 'Actual Form', dbVal: compResult.actualForm, myVal: playerData.actualForm, apply: () => handleInputChange('actualForm', compResult.actualForm), isText: false }] : []),
                                            ].map(({ label, dbVal, myVal, apply, isText }) => {
                                                if (dbVal === undefined || dbVal === null) return null;
                                                const isSame = String(dbVal) === String(myVal);
                                                return (
                                                    <div className="comp-stat-row" key={label} style={{alignItems:'center'}}>
                                                        <div className="comp-stat-header">
                                                            <span className="comp-stat-name">{label}</span>
                                                            <div className="comp-stat-vals" style={{flex:1, justifyContent:'flex-end', gap:'6px'}}>
                                                                <span style={{color:'#c084fc', fontWeight:700, fontSize:'0.9rem'}}>{String(dbVal)}</span>
                                                                {!isSame && <><span className="comp-stat-sep">vs</span><span className="comp-stat-mine" style={{opacity:0.6}}>{String(myVal)}</span></>}
                                                                {isSame && <span style={{color:'#8090a0', fontSize:'0.78rem'}}>= identic</span>}
                                                            </div>
                                                            <button className="comp-apply-btn" onClick={apply} disabled={isSame} style={isSame ? {opacity:0.35} : {}}>✓ Aplică</button>
                                                        </div>
                                                    </div>
                                                );
                                            })}

                                            {Object.entries(visibleCats).map(([catName, keys]) => (
                                                <div key={catName}>
                                                    <div className="comp-cat-title">{catName}</div>
                                                    {keys.map(key => {
                                                        const realVal = compResult.stats[key];
                                                        if (realVal === undefined) return null;
                                                        const myVal = playerData[key] || 50;
                                                        const diff = realVal - myVal;
                                                        const dbColor = realVal >= 90 ? '#1bc8b8' : realVal >= 80 ? '#8bd44a' : realVal >= 70 ? '#f0c040' : '#e05555';
                                                        const barDb = `${((realVal - 50) / 49 * 100).toFixed(1)}%`;
                                                        const barMine = `${((myVal - 50) / 49 * 100).toFixed(1)}%`;
                                                        return (
                                                            <div className="comp-stat-row" key={key}>
                                                                <div className="comp-stat-header">
                                                                    <span className="comp-stat-name">{COMP_STAT_LABELS[key] || key}</span>
                                                                    <div className="comp-stat-vals">
                                                                        <span className="comp-stat-db" style={{color: dbColor}}>{realVal}</span>
                                                                        <span className="comp-stat-sep">vs</span>
                                                                        <span className="comp-stat-mine">{myVal}</span>
                                                                    </div>
                                                                    <span className={`comp-diff ${diff > 0 ? 'pos' : diff < 0 ? 'neg' : 'neu'}`}>
                                                                        {diff > 0 ? `▲${diff}` : diff < 0 ? `▼${Math.abs(diff)}` : '='}
                                                                    </span>
                                                                    <button className="comp-apply-btn" onClick={() => applyCompStat(key, realVal)}>✓ Aplică</button>
                                                                </div>
                                                                <div className="comp-bar-wrap">
                                                                    <div className="comp-bar-mine" style={{width: barMine}}></div>
                                                                    <div className="comp-bar-db" style={{width: barDb, background: dbColor}}></div>
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            ))}

                                            <button onClick={() => { setCompResult(null); setCompCandidates([]); setCompSearch(''); }}
                                                style={{marginTop:'20px', width:'100%', padding:'11px', borderRadius:'10px', border:'1px solid rgba(192,132,252,0.15)', background:'rgba(192,132,252,0.05)', color:'#8090a0', cursor:'pointer', fontSize:'0.82rem', fontFamily:'Outfit,sans-serif', fontWeight:600, transition:'all 0.15s', letterSpacing:'0.3px'}}>
                                                ← Caută alt jucător
                                            </button>
                                            <div style={{height:'20px'}} />
                                        </div>
                                    );
                                })()}
                            </div>
                        </div>
                    </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
